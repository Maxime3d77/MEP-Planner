services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mep-planner-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mep-state:/app/data
      - ./branding:/app/branding:ro
    networks:
      - mep-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mep-planner-frontend
    restart: unless-stopped
    networks:
      - mep-net

  nginx:
    image: nginx:1.27-alpine
    container_name: mep-planner-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mep-net

networks:
  mep-net:
    driver: bridge

volumes:
  mep-state:
